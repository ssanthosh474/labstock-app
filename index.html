<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LabStock Pro</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body { font-family: sans-serif; margin:0; }
#app { display:none; padding:20px; }
#loader { display:flex; height:100vh; align-items:center; justify-content:center; }
</style>
</head>
<body>

<div id="loader">⚡ Loading...</div>
<div id="app">
  <h2>Dashboard</h2>
  <div id="members"></div>
  <div id="qr"></div>
</div>

<script>
const API = "https://labstockserver-production.up.railway.app";
const groupId = "demo";

async function startApp() {
  await fetch(`${API}/api/bootstrap?groupId=${groupId}`);

  document.getElementById("loader").style.display = "none";
  document.getElementById("app").style.display = "block";

  loadMembers();
  generateQR();
}

async function loadMembers() {
  const data = await fetch(`${API}/api/members?groupId=${groupId}`).then(r=>r.json());
  document.getElementById("members").innerHTML = data.map(m=>`<div>${m.name}</div>`).join('');
}

function generateQR(){
  const url = `${API}/p/${groupId}/item1`;
  QRCode.toCanvas(document.getElementById('qr'), url);
}

startApp();
</script>

</body>
</html>
