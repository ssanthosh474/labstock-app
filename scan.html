<!DOCTYPE html>
<html>
<head>
  <title>Opening item...</title>
</head>
<body>
<p style="text-align:center;font-family:sans-serif;margin-top:40px;">
  Opening item...
</p>

<script>
const params = new URLSearchParams(window.location.search);
const itemCode = params.get('item');

// 🔐 Check if user is logged in (adjust this based on your app)
const token = localStorage.getItem('token'); // or whatever you use

if (token) {
  // ✅ App user → go to main app
  window.location.href = `index.html?item=${encodeURIComponent(itemCode)}`;
} else {
  // 🌐 Public user → go to view-only page
  window.location.href = `view.html?item=${encodeURIComponent(itemCode)}`;
}
</script>

</body>
</html>
